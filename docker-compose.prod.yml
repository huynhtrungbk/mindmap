# =================================================
# Mindmap Selfhost — Production Docker Compose
# Port mapping:
#   App:   127.0.0.1:3057 → Nginx reverse proxy
#   DB:    internal only (no host exposure)
#   Redis: internal only (no host exposure)
# =================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindmap-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3057:3000"
    environment:
      - DATABASE_URL=postgresql://mindmap_user:${DB_PASSWORD}@db:5432/mindmap_prod?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - APP_PUBLIC_URL=https://mindmap.nerolyn.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mindmap-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: mindmap-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindmap_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mindmap_prod
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - mindmap-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mindmap_user -d mindmap_prod" ]
      interval: 5s
      timeout: 5s
      retries: 5
    # ❌ NO port exposure — DB isolated inside Docker network

  redis:
    image: redis:7-alpine
    container_name: mindmap-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - mindmap-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    # ❌ NO port exposure — Redis isolated inside Docker network

volumes:
  db_data:
    name: mindmap-db-data
  redis_data:
    name: mindmap-redis-data

networks:
  mindmap-net:
    name: mindmap-network
    driver: bridge
