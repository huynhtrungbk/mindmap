# =================================================
# Mindmap Selfhost — Production Docker Compose
# All services on same Docker bridge network
# App exposed on port 3057 for Nginx reverse proxy
# DB/Redis: internal only (no host port exposure)
# =================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindmap-app
    restart: unless-stopped
    ports:
      - "3057:3000"
    environment:
      - DATABASE_URL=postgresql://mindmap_user:${DB_PASSWORD}@db:5432/mindmap_prod?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - APP_PUBLIC_URL=https://mindmap.nerolyn.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mindmap-net

  db:
    image: postgres:15-alpine
    container_name: mindmap-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindmap_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mindmap_prod
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - mindmap-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mindmap_user -d mindmap_prod" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mindmap-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - mindmap-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    name: mindmap-db-data
  redis_data:
    name: mindmap-redis-data

networks:
  mindmap-net:
    name: mindmap-network
    driver: bridge
    ipam:
      config:
        - subnet: 10.57.0.0/20
